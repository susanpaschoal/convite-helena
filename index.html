<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Helena 1 Aninho</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f5f5;
      display: flex;
      flex-direction: column; /* empilha as imagens */
      align-items: center;
      min-height: 100vh;
    }

    .convite {
      position: relative;
      width: 100%;
      max-width: 500px;
    }

    .convite img {
      width: 100%;
      display: block;
    }

    .botao {
      position: absolute;
      width: 14%;
      height: 10%;
      border-radius: 50%;
      background: red;
      opacity: 0.3;
    }

    /* posições ajustadas para celular */
    .whatsapp {
      bottom: 18%;
      left: 22%;
    }

    .presente {
      bottom: 18%;
      left: 43%;
    }

    .localizacao {
      bottom: 18%;
      right: 22%;
    }

    /* imagem extra para completar a tela */
    .extra {
      width: 100%;
      max-width: 500px;
      display: block;
    }
  </style>
</head>
<body>
  <div class="convite">
    <img src="convite.jpeg" alt="Convite Helena">

    <a class="botao whatsapp"
      href="https://wa.me/5511971511587"
      target="_blank"></a>

    <a class="botao presente"
      href="https://drive.google.com/file/d/1WOdwGbsXBsgFUzI7Z35Rb8ZOiZBe6Ipt/view?usp=sharing"
      target="_blank"></a>

    <a class="botao localizacao"
      href="https://maps.app.goo.gl/gSRqFEwT5N8LN2rG9"
      target="_blank"></a>
  </div>

  <!-- imagem complementar -->
  <img src="detalhe.png" alt="Complemento visual" class="extra">
</body>
</html>
